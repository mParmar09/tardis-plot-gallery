# TARDIS Configuration - Uniform Density Profile
# Based on official TARDIS documentation examples
# Simplified model with constant density across all shells

tardis_config_version: v1.0

supernova:
  luminosity_requested: 9.0 log_lsun
  time_explosion: 10 day

atom_data: kurucz_cd23_chianti_H_He_latest.h5

model:
  structure:
    type: specific
    velocity:
      start: 9000 km/s
      stop: 18000 km/s
      num: 20
    density:
      type: uniform
      value: 5.e-11 g/cm^3

  abundances:
    type: uniform
    O: 0.22
    Mg: 0.04
    Si: 0.50
    S: 0.17
    Ar: 0.04
    Ca: 0.03

plasma:
  disable_electron_scattering: no
  ionization: lte
  excitation: lte
  radiative_rates_type: dilute-blackbody
  line_interaction_type: macroatom

montecarlo:
  seed: 87654321
  no_of_packets: 3.0e+4
  iterations: 18
  nthreads: 1

  last_no_of_packets: 8.0e+4
  no_of_virtual_packets: 8

  convergence_strategy:
    type: damped
    damping_constant: 1.0
    threshold: 0.06
    fraction: 0.75
    hold_iterations: 3
    t_inner:
      damping_constant: 0.5

spectrum:
  start: 500 angstrom
  stop: 20000 angstrom
  num: 10000
