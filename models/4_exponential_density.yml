# TARDIS Configuration - Exponential Density Profile
# Based on official TARDIS documentation examples
# Density decreases exponentially with velocity

tardis_config_version: v1.0

supernova:
  luminosity_requested: 9.6 log_lsun
  time_explosion: 20 day

atom_data: kurucz_cd23_chianti_H_He_latest.h5

model:
  structure:
    type: specific
    velocity:
      start: 1.2e4 km/s
      stop: 25000 km/s
      num: 30
    density:
      type: exponential
      rho_0: 1.e-10 g/cm^3
      v_0: 10000 km/s

  abundances:
    type: uniform
    O: 0.16
    Mg: 0.06
    Si: 0.45
    S: 0.22
    Ar: 0.07
    Ca: 0.04

plasma:
  disable_electron_scattering: no
  ionization: lte
  excitation: lte
  radiative_rates_type: dilute-blackbody
  line_interaction_type: macroatom

montecarlo:
  seed: 55555555
  no_of_packets: 6.0e+4
  iterations: 30
  nthreads: 4

  last_no_of_packets: 2.0e+5
  no_of_virtual_packets: 15

  convergence_strategy:
    type: damped
    damping_constant: 1.0
    threshold: 0.03
    fraction: 0.90
    hold_iterations: 5
    t_inner:
      damping_constant: 0.5

spectrum:
  start: 500 angstrom
  stop: 20000 angstrom
  num: 10000
