# TARDIS Configuration - CSVY Model Format
# Based on official TARDIS documentation
# CSVY format allows custom shell-by-shell specification
# This file references an external CSVY file for the model

tardis_config_version: v1.0

supernova:
  luminosity_requested: 9.3 log_lsun
  time_explosion: 12 day

atom_data: kurucz_cd23_chianti_H_He_latest.h5

# Instead of inline model, CSVY format uses external file
# Uncomment the line below and create csvy_model.csvy file
# csvy_model: csvy_model.csvy

# For this example, we include inline model similar to CSVY structure
model:
  structure:
    type: specific
    velocity:
      start: 1.05e4 km/s
      stop: 21000 km/s
      num: 22
    density:
      type: branch85_w7

  abundances:
    type: uniform
    H: 0.02
    He: 0.10
    O: 0.17
    Mg: 0.04
    Si: 0.49
    S: 0.15
    Ar: 0.02
    Ca: 0.01

plasma:
  disable_electron_scattering: no
  ionization: lte
  excitation: lte
  radiative_rates_type: dilute-blackbody
  line_interaction_type: macroatom

montecarlo:
  seed: 99999999
  no_of_packets: 4.5e+4
  iterations: 22
  nthreads: 2

  last_no_of_packets: 1.2e+5
  no_of_virtual_packets: 11

  convergence_strategy:
    type: damped
    damping_constant: 1.0
    threshold: 0.045
    fraction: 0.82
    hold_iterations: 3
    t_inner:
      damping_constant: 0.5

spectrum:
  start: 500 angstrom
  stop: 20000 angstrom
  num: 10000
